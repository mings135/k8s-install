# 集群初始化后请勿随意修改配置, 否则可能导致无法正常运行(kubenetes version >= 1.31)!!!

# 远程节点保存脚本的目录, 上层目录必须存在(默认：/opt/k8sRemoteScript or /${HOME}/k8sRemoteScript)
remoteScriptDir: ""
# 是否使用国内 apt 镜像源(默认 false)
localMirror: ""
# 所有节点统一账号(默认 root), 非 root 用户必须拥有 sudo 的执行权限
nodeUser: ""
# 所有节点统一密码(默认为空, 控制台输入)
nodePassword: ""

cluster:
  kubernetesVersion: ""
  # 对应 kubeadm 中 controlPlaneEndpoint(默认 master1 address, port 6443)
  controlPlaneAddress: ""
  controlPlanePort:
  # kubeadm 镜像仓库地址(例如：registry.k8s.io)
  imageRepository: ""
  # kubeadm 设置证书期限(格式: 8760h0m0s, 默认: k8s 默认的 3 倍)
  caCertificateValidityPeriod: ""
  certificateValidityPeriod: ""

container:
  # 私有仓库地址(例如：http://192.168.10.10)
  privateRepository: ""

nodes:
  # 第一个初始化集群的 master 节点(必须)
  master1:
    domain: m1.k8s
    address: "192.168.11.50"
  # 其他 master 节点
  master:
  - domain: m2.k8s
    address: "192.168.11.51"
  - domain: m3.k8s
    address: "192.168.11.52"
  # 工作节点
  work:
  - domain: w1.k8s
    address: "192.168.11.53"
